<!DOCTYPE html>
<html>
<head>
    <title>View Certificate</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            margin: 0;
            background: #f0f0f0;
        }

        /* Top fake browser bar */
        .topbar {
            background: #202124;
            color: white;
            padding: 10px;
            font-size: 14px;
        }

        .viewer {
            display: flex;
            justify-content: center;
            align-items: center;
            height: calc(100vh - 40px);
        }

        img {
            width: 95%;
            max-width: 900px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.3);
        }
    </style>
</head>

<body>

<div class="topbar">
    archive.nptel.ac.in/noc/Ecel
</div>

<div class="viewer">
    <img src="main.jpg">
</div>

</body>
</html>
